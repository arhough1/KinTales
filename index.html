<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinTales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Runtime API key config: copy config.example.js → config.js, fill in your key, upload both files to Hostinger -->
    <script>
        // Dynamically load config.js so the app doesn't crash if it's missing on the web host.
        // If missing, the avatar generator will prompt the user to add the key instead of breaking.
        window.KINTALES_CONFIG = window.KINTALES_CONFIG || {};
    </script>
    <script src="config.js" onerror="console.warn('KinTales: config.js not found — avatar generation will be disabled. Upload config.js to your web host. See config.example.js for instructions.')"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3"
      }
    }
    </script>
</head>

<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.3';
        import {
            Sun, Moon, Sparkles, BookOpen, Users,
            Wand2, Image as ImageIcon, Upload, ChevronRight,
            Library, Camera, Shield, PlayCircle, Map, UserPlus, Loader2, Pencil, X
        } from 'lucide-react';

        const supabaseUrl = 'https://wdjcsbdywbfoeayploni.supabase.co';
        const supabaseKey = 'sb_publishable_wJkAdB8VD5Tfxjxce6QbhQ_G7c_7_ak';
        const supabase = createClient(supabaseUrl, supabaseKey);

        const AuthView = ({ theme, isNightMode, setCurrentView }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');

            const handleAuth = async (isSignUp) => {
                setLoading(true);
                setMessage('');
                try {
                    const { error } = isSignUp
                        ? await supabase.auth.signUp({ email, password })
                        : await supabase.auth.signInWithPassword({ email, password });

                    if (error) throw error;
                    if (isSignUp) {
                        setMessage('Sign up successful! (Check email if confirmation is enabled)');
                    } else {
                        setCurrentView('hub');
                    }
                } catch (error) {
                    setMessage(error.message);
                } finally {
                    setLoading(false);
                }
            };

            const signInWithGoogle = async () => {
                setLoading(true);
                try {
                    const { data, error } = await supabase.auth.signInWithOAuth({
                        provider: 'google',
                        options: {
                            redirectTo: window.location.origin,
                            queryParams: {
                                access_type: 'offline',
                                prompt: 'consent',
                            },
                        },
                    });

                    if (error) throw error;
                } catch (error) {
                    setMessage('Error signing in with Google: ' + error.message);
                    setLoading(false);
                }
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-[80vh] px-4 animate-fade-in">
                    <div className={`p-8 rounded-2xl border ${theme.card} w-full max-w-md shadow-xl`}>
                        <div className="flex justify-center mb-6">
                            <div className={`p-3 rounded-full bg-gradient-to-tr ${theme.portal}`}>
                                <Sparkles className="text-white w-6 h-6" />
                            </div>
                        </div>
                        <h2 className={`text-2xl font-bold text-center mb-6 ${isNightMode ? 'font-sans' : 'font-serif'}`}>Welcome to KinTales</h2>
                        {message && <div className={`p-3 mb-4 rounded-lg text-sm ${message.includes('error') || message.includes('invalid') || message.includes('fetch') ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`}>{message}</div>}
                        <div className="space-y-4">
                            <div>
                                <label className={`block text-xs font-bold uppercase tracking-wider mb-1 ${theme.textMuted}`}>Email</label>
                                <input type="email" value={email} onChange={e => setEmail(e.target.value)} className={`w-full p-3 rounded-lg border bg-transparent focus:outline-none focus:ring-2 focus:ring-cyan-500 ${isNightMode ? 'border-slate-700' : 'border-amber-200'}`} placeholder="you@example.com" />
                            </div>
                            <div>
                                <label className={`block text-xs font-bold uppercase tracking-wider mb-1 ${theme.textMuted}`}>Password</label>
                                <input type="password" value={password} onChange={e => setPassword(e.target.value)} className={`w-full p-3 rounded-lg border bg-transparent focus:outline-none focus:ring-2 focus:ring-cyan-500 ${isNightMode ? 'border-slate-700' : 'border-amber-200'}`} placeholder="••••••••" />
                            </div>
                            <div className="flex gap-4 pt-4">
                                <button onClick={() => handleAuth(true)} disabled={loading} className={`flex-1 py-3 rounded-lg font-bold border-2 transition-all hover:bg-black/5 ${isNightMode ? 'border-slate-700' : 'border-amber-200'}`}>Sign Up</button>
                                <button onClick={() => handleAuth(false)} disabled={loading} className={`flex-1 py-3 rounded-lg font-bold text-white transition-all shadow-md ${theme.accent}`}>Sign In</button>
                            </div>

                            <div className="relative flex items-center py-2">
                                <div className="flex-grow border-t border-slate-300 dark:border-slate-600"></div>
                                <span className={`flex-shrink-0 mx-4 text-xs font-bold uppercase tracking-wider ${theme.textMuted}`}>Or</span>
                                <div className="flex-grow border-t border-slate-300 dark:border-slate-600"></div>
                            </div>

                            <button onClick={signInWithGoogle} disabled={loading} className={`w-full flex items-center justify-center gap-3 py-3 rounded-lg font-bold border-2 transition-all hover:bg-black/5 ${isNightMode ? 'border-slate-700 bg-slate-800 text-white hover:bg-slate-700' : 'border-slate-200 bg-white text-slate-700 hover:bg-slate-50'}`}>
                                <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                                </svg>
                                Continue with Google
                            </button>
                        </div>
                    </div>
                </div>
            );
        };



        function App() {
            // Global State
            const [isNightMode, setIsNightMode] = useState(false);
            const [currentView, setCurrentView] = useState('landing'); // landing, auth, hub, heroes, forge, archive
            const [session, setSession] = useState(null);
            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);

            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    setSession(session);
                    setUser(session?.user);
                    setIsAdmin(session?.user?.email === 'admin@kintales.com');
                });

                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
                    setSession(session);
                    setUser(session?.user);
                    setIsAdmin(session?.user?.email === 'admin@kintales.com');
                    if (!session && currentView !== 'landing' && currentView !== 'auth') {
                        setCurrentView('landing');
                    }
                });

                return () => subscription.unsubscribe();
            }, [currentView]);

            // Local State for specific views
            const [heroTab, setHeroTab] = useState('gallery'); // gallery, training
            const [selectedHero, setSelectedHero] = useState(null);
            const [selectedTheme, setSelectedTheme] = useState(null);
            const [selectedTrackId, setSelectedTrackId] = useState('');

            // Themes
            const themes = [
                { id: 'treasure', name: 'Treasure Hunter', icon: '🗺️', color: 'from-amber-400 to-orange-500' },
                { id: 'space', name: 'Sci-Fi Explorer', icon: '🚀', color: 'from-blue-500 to-indigo-600' },
                { id: 'fairy', name: 'Fairy Tale', icon: '🏰', color: 'from-pink-400 to-rose-500' },
                { id: 'race', name: 'Race Cars', icon: '🏎️', color: 'from-red-500 to-orange-600' }
            ];

            // App Data State
            const [characters, setCharacters] = useState([]);
            const [stories, setStories] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);
            const [isLoadingData, setIsLoadingData] = useState(false);
            const [isUploading, setIsUploading] = useState(false);

            // Adventure Tracks State
            const [tracks, setTracks] = useState([]);
            const [isCreatingTrack, setIsCreatingTrack] = useState(false);
            const [newTrackName, setNewTrackName] = useState('');
            const [newTrackHeroId, setNewTrackHeroId] = useState('');
            const [newTrackThemeId, setNewTrackThemeId] = useState('');

            useEffect(() => {
                if (!session?.user) return;
                const loadData = async () => {
                    setIsLoadingData(true);
                    try {
                        const [charsResponse, storiesResponse] = await Promise.all([
                            supabase.from('characters').select('*').order('created_at', { ascending: false }),
                            supabase.from('stories').select('*, character:characters(*)').order('created_at', { ascending: false })
                        ]);

                        if (charsResponse.error) throw charsResponse.error;
                        if (storiesResponse.error) throw storiesResponse.error;

                        const localAgesStr = localStorage.getItem(`kintales_hero_ages_${session.user.id}`) || '{}';
                        const localAges = JSON.parse(localAgesStr);
                        const localQuirksStr = localStorage.getItem(`kintales_hero_quirks_${session.user.id}`) || '{}';
                        const localQuirks = JSON.parse(localQuirksStr);
                        const localAvatarsStr = localStorage.getItem(`kintales_hero_avatars_${session.user.id}`) || '{}';
                        const localAvatars = JSON.parse(localAvatarsStr);

                        const mappedChars = charsResponse.data.map(c => ({
                            ...c,
                            age: c.age || localAges[c.id] || '',
                            quirk: c.quirk || localQuirks[c.id] || '',
                            visual_description: c.visual_description || '',
                            generated_prompt: c.generated_prompt || '',
                            archetype_list: c.archetype_list || [],
                            avatar: localAvatars[c.id] || '',
                            image: localAvatars[c.id] || c.emoji_icon || '✨',
                            images: c.image_paths || []
                        }));

                        const mappedStories = storiesResponse.data.map(s => ({
                            ...s,
                            hero: {
                                ...s.character,
                                image: localAvatars[s.character?.id] || s.character?.emoji_icon || '✨'
                            },
                            theme: themes.find(t => t.id === s.theme_id) || themes[0],
                            date: new Date(s.created_at).toLocaleDateString()
                        }));

                        setCharacters(mappedChars);
                        setStories(mappedStories);

                        // Try to load adventure_tracks from Supabase with LocalStorage fallback
                        try {
                            const { data: tracksData, error: tracksError } = await supabase
                                .from('adventure_tracks')
                                .select('*')
                                .order('created_at', { ascending: false });
                            
                            if (tracksError) throw tracksError;
                            setTracks(tracksData || []);
                        } catch (tracksErr) {
                            console.warn("Supabase adventure_tracks failed to load (falling back to LocalStorage):", tracksErr);
                            const localTracksStr = localStorage.getItem(`kintales_tracks_${session.user.id}`);
                            if (localTracksStr) {
                                setTracks(JSON.parse(localTracksStr));
                            } else {
                                // Populate with initial defaults matching loaded characters if possible
                                const initialTracks = [
                                    {
                                        id: 'default-maya',
                                        name: "Maya's Missions",
                                        character_id: mappedChars.find(c => c.name.toLowerCase() === 'maya')?.id || 'default-char-maya',
                                        theme_id: 'fairy',
                                        isDefault: true,
                                        mockCount: 3,
                                        mockLastStory: 'The Crystal Caves',
                                        mockEmoji: '👧🏽'
                                    },
                                    {
                                        id: 'default-sam',
                                        name: "Sam's Sci-Fi Series",
                                        character_id: mappedChars.find(c => c.name.toLowerCase() === 'sam')?.id || 'default-char-sam',
                                        theme_id: 'space',
                                        isDefault: true,
                                        mockCount: 1,
                                        mockLastStory: 'Mars Rover Rescue',
                                        mockEmoji: '👦🏻'
                                    }
                                ];
                                setTracks(initialTracks);
                                localStorage.setItem(`kintales_tracks_${session.user.id}`, JSON.stringify(initialTracks));
                            }
                        }
                    } catch (err) {
                        console.error("Error loading data:", err);
                    } finally {
                        setIsLoadingData(false);
                    }
                };
                loadData();
            }, [session]);

            // Form State
            const [editingHeroId, setEditingHeroId] = useState(null);
            const [newHeroName, setNewHeroName] = useState('');
            const [newHeroRole, setNewHeroRole] = useState('');
            const [newHeroAge, setNewHeroAge] = useState('');
            const [newHeroQuirk, setNewHeroQuirk] = useState('');
            const [uploadedImages, setUploadedImages] = useState([]);
            const [isAnalyzingImage, setIsAnalyzingImage] = useState(false);
            const [archetypeMode, setArchetypeMode] = useState('standard'); // 'standard' or 'vision'
            const [visualDescription, setVisualDescription] = useState('');
            const [generatedPrompt, setGeneratedPrompt] = useState('');
            const [archetypeList, setArchetypeList] = useState([]);
            const [archetypeIndex, setArchetypeIndex] = useState(0);
            const fileInputRef = React.useRef(null);

            // Avatar Generation State
            const [newHeroAvatar, setNewHeroAvatar] = useState(''); // base64 data URL
            const [isGeneratingAvatar, setIsGeneratingAvatar] = useState(false);
            const [avatarStatusMsg, setAvatarStatusMsg] = useState('');

            // Helper: renders either a <img> (for URL/base64 avatars) or emoji text
            const renderCharacterAvatar = (avatarOrEmoji, name, imgClassName, emojiClassName) => {
                if (avatarOrEmoji && (avatarOrEmoji.startsWith('data:') || avatarOrEmoji.startsWith('http'))) {
                    return <img src={avatarOrEmoji} alt={name} className={imgClassName} style={{objectFit:'cover'}} />;
                }
                return <span className={emojiClassName}>{avatarOrEmoji || '✨'}</span>;
            };

            const handleGenerateAvatar = async () => {
                if (!newHeroName) { alert('Please enter a name first.'); return; }
                const geminiKey = (window.KINTALES_CONFIG || {}).GEMINI_API_KEY || '';
                if (!geminiKey || geminiKey === 'YOUR_GEMINI_API_KEY_HERE') {
                    alert('Please add your Gemini API key to config.js first.\nOpen config.js and replace YOUR_GEMINI_API_KEY_HERE with your key.');
                    return;
                }

                setIsGeneratingAvatar(true);
                const messages = [
                    '✨ Whispering incantations...',
                    '🎨 Splashing watercolors...',
                    '🖌️ Sketching the portrait...',
                    '⚡ Adding magic sparkles...',
                    '🌟 Bringing the hero to life...'
                ];
                let msgIdx = 0;
                setAvatarStatusMsg(messages[0]);
                const msgInterval = setInterval(() => {
                    msgIdx = (msgIdx + 1) % messages.length;
                    setAvatarStatusMsg(messages[msgIdx]);
                }, 1200);

                try {
                    let finalVisualDescription = visualDescription;
                    if (!finalVisualDescription && uploadedImages && uploadedImages.length > 0) {
                        try {
                            setAvatarStatusMsg('🔍 Analyzing reference photos...');
                            const result = await get_visual_description(uploadedImages, 'gemini-flash-latest', geminiKey);
                            if (result) {
                                finalVisualDescription = result.visual_description || '';
                                setVisualDescription(finalVisualDescription);
                            }
                        } catch (e) {
                            console.warn("Failed to analyze image:", e);
                        }
                    }
                    
                    if (uploadedImages && uploadedImages.length > 0) {
                        setAvatarStatusMsg('🎨 Splashing watercolors...');
                    }

                    const prompt = [
                        `A highly detailed cartoonish portrait avatar of a cute cheerful ${finalVisualDescription ? 'character' : 'child character'} named ${newHeroName},`,
                        newHeroAge ? `${newHeroAge} years old,` : '',
                        newHeroRole ? `who is a ${newHeroRole}.` : '',
                        newHeroQuirk ? `Character personality: ${newHeroQuirk}.` : '',
                        finalVisualDescription ? `Visual appearance: ${finalVisualDescription}` : '',
                        'Pixar Disney 3D animated style, vibrant saturated colors, warm friendly expression,',
                        'clean solid pastel background, soft round studio lighting, perfect square avatar portrait,',
                        'high quality digital art, ultra detailed, professional character design.'
                    ].filter(Boolean).join(' ');
                    
                    setGeneratedPrompt(prompt);

                    // Capture info and trigger download
                    try {
                        const captureText = `Hero Name: ${newHeroName}\nAge: ${newHeroAge || 'N/A'}\nRole: ${newHeroRole || 'N/A'}\nQuirk: ${newHeroQuirk || 'N/A'}\nVisual Description (extracted from uploaded image): ${finalVisualDescription || 'None'}\n\nGenerated Prompt:\n${prompt}`;
                        const blob = new Blob([captureText], { type: 'text/plain' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                        a.href = url;
                        a.download = `Portrait_Info_${newHeroName.replace(/[^a-z0-9]/gi, '_')}_${timestamp}.txt`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                    } catch(err) {
                        console.error('Failed to download prompt info:', err);
                    }

                    // Use Imagen 4.0 for image generation
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${geminiKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                instances: [{ prompt }],
                                parameters: {
                                    sampleCount: 1,
                                    aspectRatio: '1:1',
                                    safetyFilterLevel: 'BLOCK_ONLY_HIGH',
                                    personGeneration: 'ALLOW_ADULT'
                                }
                            })
                        }
                    );

                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        throw new Error(errData?.error?.message || `API error ${response.status}`);
                    }

                    const data = await response.json();
                    const b64 = data?.predictions?.[0]?.bytesBase64Encoded;
                    const mimeType = data?.predictions?.[0]?.mimeType || 'image/png';
                    if (!b64) throw new Error('No image returned by Gemini.');

                    const dataUrl = `data:${mimeType};base64,${b64}`;
                    setNewHeroAvatar(dataUrl);
                    setAvatarStatusMsg('🎉 Portrait complete!');
                    setTimeout(() => setAvatarStatusMsg(''), 2000);
                } catch (err) {
                    console.error('Avatar generation error:', err);
                    setAvatarStatusMsg(`❌ ${err.message}`);
                    setTimeout(() => setAvatarStatusMsg(''), 4000);
                } finally {
                    clearInterval(msgInterval);
                    setIsGeneratingAvatar(false);
                }
            };

            const handleEditHero = (hero) => {
                setEditingHeroId(hero.id);
                setNewHeroName(hero.name);
                setNewHeroRole(hero.role);
                setNewHeroAge(hero.age || '');
                setNewHeroQuirk(hero.quirk || '');
                setUploadedImages(hero.images || []); // Load existing images
                setVisualDescription(hero.visual_description || '');
                setGeneratedPrompt(hero.generated_prompt || '');
                setArchetypeList(hero.archetype_list || []);
                setArchetypeIndex(0);
                setNewHeroAvatar(hero.avatar || '');
                setHeroTab('training');
            };

            const get_visual_description = async (pictures, model, apiKey) => {
                if (!pictures || pictures.length === 0) return null;
                
                try {
                    const imgRes = await fetch(pictures[0]);
                    const imgBlob = await imgRes.blob();
                    const base64Data = await new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result.split(',')[1]);
                        reader.readAsDataURL(imgBlob);
                    });

                    const systemInstruction = "Task: Generate a highly detailed visual description from the pictures. Make sure to capture:\n1) What type of character the picture is mainly about to include: Type: human, animal, if animal what kind of animal is it. If human: try to capture age: child, pre-teen, teen, old. If pictures seem to conflict, ignore this trait. If human: capture skin color. If animal: color, any color pattern, if animal has fur is it fluffy, long hair, etc.\n2) any quirky or unusual trails such as snaggle tooth, eye orientation (crossed, lazy, drifting, etc), different color of eyes, etc.\n3) hair or fur style (do the pictures show the subject to have spike or frosted tips in thier hair/fur/mane/etc)\n4) Capture detailed information about eyes, ears, hair/fur/mane/etc, body type: (slim, overweight, athletic, etc, without negative connotations).\n5) Capture anything else relevant.\n\nAlso create a list of 5 fun, personal, entertaining, age appropriate archetypes based on the visual description.\n\nReturn EXACTLY a JSON object with this schema: { \"visual_description\": \"...\", \"archetypes\": [\"The ...\", \"The ...\"] } without markdown formatting.";

                    const visionRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: systemInstruction },
                                    { inlineData: { mimeType: imgBlob.type, data: base64Data } }
                                ]
                            }],
                            generationConfig: {
                                responseMimeType: "application/json"
                            }
                        })
                    });
                    
                    if (visionRes.ok) {
                        const visionData = await visionRes.json();
                        const text = visionData.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (text) {
                            return JSON.parse(text);
                        }
                    }
                } catch (e) {
                    console.error("Failed get_visual_description:", e);
                }
                return null;
            };

            const handleGenerateArchetypes = async () => {
                if (isAnalyzingImage) return;

                if (uploadedImages.length > 0) {
                    const geminiKey = (window.KINTALES_CONFIG || {}).GEMINI_API_KEY || '';
                    if (!geminiKey || geminiKey === 'YOUR_GEMINI_API_KEY_HERE') {
                        alert('Please add your Gemini API key to config.js first.');
                        return;
                    }
                    setIsAnalyzingImage(true);
                    const result = await get_visual_description(uploadedImages, 'gemini-flash-latest', geminiKey);
                    if (result) {
                        setVisualDescription(result.visual_description || '');
                        
                        // Merge standard list
                        const standardSuggestions = [
                            "The Curious Inventor", "The Brave Explorer", "The Loyal Companion",
                            "The Fearless Scout", "The Wise Wizard", "The Noble Knight",
                            "The Swift Runner", "The Master Detective", "The Star Captain",
                            "The Secret Agent", "The Magical Guardian", "The Treasure Hunter",
                            "The Dream Weaver", "The Shadow Walker", "The Cosmic Voyager"
                        ];
                        const newArchList = [...(result.archetypes || []), ...standardSuggestions];
                        setArchetypeList(newArchList);
                        setArchetypeIndex(0);
                        if (result.archetypes && result.archetypes.length > 0) {
                            setNewHeroRole(result.archetypes[0]);
                        }
                    }
                    setIsAnalyzingImage(false);
                }
            };

            const cycleArchetype = () => {
                const list = archetypeList.length > 0 ? archetypeList : [
                    "The Curious Inventor", "The Brave Explorer", "The Loyal Companion",
                    "The Fearless Scout", "The Wise Wizard", "The Noble Knight",
                    "The Swift Runner", "The Master Detective", "The Star Captain",
                    "The Secret Agent", "The Magical Guardian", "The Treasure Hunter",
                    "The Dream Weaver", "The Shadow Walker", "The Cosmic Voyager"
                ];
                const nextIdx = (archetypeIndex + 1) % list.length;
                setArchetypeIndex(nextIdx);
                setNewHeroRole(list[nextIdx]);
            };

            const handleImageUpload = async (e) => {
                if (e.target.files && session?.user) {
                    setIsUploading(true);
                    const files = Array.from(e.target.files);
                    const newImageUrls = [];

                    for (const file of files) {
                        const fileExt = file.name.split('.').pop();
                        const fileName = `${Math.random()}.${fileExt}`;
                        const filePath = `${session.user.id}/${fileName}`;

                        const { error: uploadError } = await supabase.storage
                            .from('hero_images')
                            .upload(filePath, file);

                        if (uploadError) {
                            console.error("Upload error:", uploadError);
                            continue;
                        }

                        const { data: { publicUrl } } = supabase.storage
                            .from('hero_images')
                            .getPublicUrl(filePath);

                        newImageUrls.push(publicUrl);
                    }

                    setUploadedImages(prev => {
                        const newImages = [...prev, ...newImageUrls];
                        if (newImages.length > 0) setArchetypeMode('vision');
                        return newImages;
                    });
                    setIsUploading(false);
                }
            };

            const handleRemoveImage = (indexToRemove) => {
                setUploadedImages(prev => {
                    const newImages = prev.filter((_, idx) => idx !== indexToRemove);
                    if (newImages.length === 0) setArchetypeMode('standard');
                    return newImages;
                });
            };

            const handleSaveHero = async () => {
                if (!newHeroName || !newHeroAge || !session?.user) return;
                setIsGenerating(true);

                try {
                    const heroData = {
                        user_id: session.user.id,
                        name: newHeroName,
                        role: newHeroRole || 'The Mysterious Wanderer',
                        type: 'child',
                        emoji_icon: uploadedImages.length > 0 ? '✨' : '🌟',
                        image_paths: uploadedImages,
                        age: newHeroAge || '',
                        quirk: newHeroQuirk || '',
                        visual_description: visualDescription || '',
                        generated_prompt: generatedPrompt || '',
                        archetype_list: archetypeList || []
                    };

                    let data, error;
                    try {
                        if (editingHeroId) {
                            const res = await supabase.from('characters').update(heroData).eq('id', editingHeroId).select().single();
                            data = res.data;
                            error = res.error;
                        } else {
                            const res = await supabase.from('characters').insert(heroData).select().single();
                            data = res.data;
                            error = res.error;
                        }
                        if (error) throw error;
                    } catch (supabaseErr) {
                        const isMissingColumn = supabaseErr.message?.includes('age') || supabaseErr.message?.includes('quirk') || supabaseErr.code === '42703';
                        if (isMissingColumn) {
                            console.warn("Supabase characters table missing columns. Falling back to LocalStorage.");
                            const { age, quirk, visual_description, generated_prompt, archetype_list, ...strippedHeroData } = heroData;
                            if (editingHeroId) {
                                const res = await supabase.from('characters').update(strippedHeroData).eq('id', editingHeroId).select().single();
                                data = res.data;
                                error = res.error;
                            } else {
                                const res = await supabase.from('characters').insert(strippedHeroData).select().single();
                                data = res.data;
                                error = res.error;
                            }
                            if (error) throw error;

                            data.age = newHeroAge;
                            data.quirk = newHeroQuirk;
                            data.visual_description = visualDescription;
                            data.generated_prompt = generatedPrompt;
                            data.archetype_list = archetypeList;
                        } else {
                            throw supabaseErr;
                        }
                    }

                    // Save to LocalStorage for offline persistence / consistent cache state
                    const saveToLocal = (key, value) => {
                        const str = localStorage.getItem(key) || '{}';
                        const obj = JSON.parse(str);
                        obj[data.id] = value;
                        localStorage.setItem(key, JSON.stringify(obj));
                    };

                    saveToLocal(`kintales_hero_ages_${session.user.id}`, newHeroAge);
                    saveToLocal(`kintales_hero_quirks_${session.user.id}`, newHeroQuirk);
                    saveToLocal(`kintales_hero_visdesc_${session.user.id}`, visualDescription);
                    saveToLocal(`kintales_hero_genprompt_${session.user.id}`, generatedPrompt);
                    saveToLocal(`kintales_hero_archlist_${session.user.id}`, archetypeList);

                    if (newHeroAvatar) {
                        saveToLocal(`kintales_hero_avatars_${session.user.id}`, newHeroAvatar);
                    }

                    const mappedSavedHero = {
                        ...data,
                        age: newHeroAge,
                        quirk: newHeroQuirk,
                        visual_description: visualDescription,
                        generated_prompt: generatedPrompt,
                        archetype_list: archetypeList,
                        avatar: newHeroAvatar || '',
                        image: newHeroAvatar || data.emoji_icon || '✨',
                        images: data.image_paths || []
                    };

                    if (editingHeroId) {
                        setCharacters(characters.map(c => c.id === editingHeroId ? mappedSavedHero : c));
                    } else {
                        setCharacters([mappedSavedHero, ...characters]);
                    }

                    setEditingHeroId(null);
                    setNewHeroName('');
                    setNewHeroRole('');
                    setNewHeroAge('');
                    setNewHeroQuirk('');
                    setNewHeroAvatar('');
                    setUploadedImages([]);
                    setArchetypeMode('standard');
                    setVisualDescription('');
                    setGeneratedPrompt('');
                    setArchetypeList([]);
                    setArchetypeIndex(0);
                    setHeroTab('gallery');
                } catch (err) {
                    console.error("Error saving hero:", err);
                    alert("Failed to save hero: " + err.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            const handleCancelEdit = () => {
                setEditingHeroId(null);
                setNewHeroName('');
                setNewHeroRole('');
                setNewHeroAge('');
                setNewHeroQuirk('');
                setNewHeroAvatar('');
                setUploadedImages([]);
                setHeroTab('gallery');
            };

            const handleCreateTrack = async () => {
                if (!newTrackName || !newTrackHeroId || !session?.user) return;
                setIsGenerating(true);

                try {
                    const trackPayload = {
                        user_id: session.user.id,
                        character_id: newTrackHeroId,
                        name: newTrackName,
                        theme_id: newTrackThemeId || 'treasure'
                    };

                    let newTrack;
                    try {
                        const { data, error } = await supabase.from('adventure_tracks').insert(trackPayload).select().single();
                        if (error) throw error;
                        newTrack = data;
                    } catch (supabaseErr) {
                        console.warn("Failed to save track in Supabase (falling back to local):", supabaseErr);
                        newTrack = {
                            id: 'local-' + Math.random().toString(36).substring(2, 9),
                            created_at: new Date().toISOString(),
                            user_id: session.user.id,
                            character_id: newTrackHeroId,
                            name: newTrackName,
                            theme_id: newTrackThemeId || 'treasure'
                        };

                        // Save in LocalStorage
                        const localTracksStr = localStorage.getItem(`kintales_tracks_${session.user.id}`);
                        let localTracks = localTracksStr ? JSON.parse(localTracksStr) : [];
                        localTracks = [newTrack, ...localTracks];
                        localStorage.setItem(`kintales_tracks_${session.user.id}`, JSON.stringify(localTracks));
                    }

                    setTracks(prev => [newTrack, ...prev]);
                    setIsCreatingTrack(false);
                    setNewTrackName('');
                    setNewTrackHeroId('');
                    setNewTrackThemeId('');
                } catch (err) {
                    console.error("Error creating track:", err);
                    alert("Failed to create track: " + err.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            const handleDeleteTrack = async (trackId) => {
                if (!confirm("Are you sure you want to delete this Adventure Track? Your saved stories will not be deleted.")) return;
                
                try {
                    if (!trackId.startsWith('default-') && !trackId.startsWith('local-')) {
                        const { error } = await supabase.from('adventure_tracks').delete().eq('id', trackId);
                        if (error) throw error;
                    } else {
                        // Delete from localStorage
                        const localTracksStr = localStorage.getItem(`kintales_tracks_${session.user.id}`);
                        if (localTracksStr) {
                            let localTracks = JSON.parse(localTracksStr);
                            localTracks = localTracks.filter(t => t.id !== trackId);
                            localStorage.setItem(`kintales_tracks_${session.user.id}`, JSON.stringify(localTracks));
                        }
                    }

                    setTracks(prev => prev.filter(t => t.id !== trackId));
                } catch (err) {
                    console.error("Error deleting track:", err);
                    alert("Failed to delete track: " + err.message);
                }
            };

            const handleForgeStory = async () => {
                if (!selectedHero || !selectedTheme || !session?.user) return;
                setIsGenerating(true);

                try {
                    const hero = characters.find(c => c.id === selectedHero);
                    const themeObj = themes.find(t => t.id === selectedTheme);
                    const title = `${hero.name}'s ${themeObj.name} Adventure`;

                    // Attempt to insert with track_id
                    let storyResult;
                    try {
                        const insertPayload = {
                            user_id: session.user.id,
                            character_id: hero.id,
                            title: title,
                            theme_id: themeObj.id
                        };
                        
                        if (selectedTrackId && !selectedTrackId.startsWith('default-') && !selectedTrackId.startsWith('local-')) {
                            insertPayload.track_id = selectedTrackId;
                        }

                        const { data, error } = await supabase.from('stories').insert(insertPayload).select('*, character:characters(*)').single();
                        if (error) throw error;
                        storyResult = data;
                    } catch (supabaseErr) {
                        console.warn("Inserting story with track_id failed (likely database column does not exist yet). Retrying without track_id:", supabaseErr);
                        // Retry inserting without track_id
                        const { data, error } = await supabase.from('stories').insert({
                            user_id: session.user.id,
                            character_id: hero.id,
                            title: title,
                            theme_id: themeObj.id
                        }).select('*, character:characters(*)').single();

                        if (error) throw error;
                        storyResult = data;

                        // Save the story-to-track association in localStorage fallback if a track was selected
                        if (selectedTrackId) {
                            const localAssocStr = localStorage.getItem(`kintales_story_tracks_${session.user.id}`) || '{}';
                            const localAssocs = JSON.parse(localAssocStr);
                            localAssocs[storyResult.id] = selectedTrackId;
                            localStorage.setItem(`kintales_story_tracks_${session.user.id}`, JSON.stringify(localAssocs));
                        }
                    }

                    // Save local association for default/local tracks
                    if (selectedTrackId && (selectedTrackId.startsWith('default-') || selectedTrackId.startsWith('local-'))) {
                        const localAssocStr = localStorage.getItem(`kintales_story_tracks_${session.user.id}`) || '{}';
                        const localAssocs = JSON.parse(localAssocStr);
                        localAssocs[storyResult.id] = selectedTrackId;
                        localStorage.setItem(`kintales_story_tracks_${session.user.id}`, JSON.stringify(localAssocs));
                    }

                    const newStory = {
                        ...storyResult,
                        hero: { ...storyResult.character, image: storyResult.character?.emoji_icon || '✨' },
                        theme: themeObj,
                        date: new Date(storyResult.created_at).toLocaleDateString()
                    };

                    setStories([newStory, ...stories]);
                    setCurrentView('archive');
                    setSelectedHero(null);
                    setSelectedTheme(null);
                    setSelectedTrackId('');
                } catch (err) {
                    console.error("Error forging story:", err);
                    alert("Failed to forge story: " + err.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            // Theme configuration based on Day/Night state

                };

                                'text-slate-600 shadow-sm'}`}

                        >
                            {isNightMode ? <Moon className="w-5 h-5" /> : <Sun className="w-5 h-5" />}
                        </button>

                        {currentView === 'landing' && !session ? (

                                const trackStories = stories.filter(s => s.track_id === track.id || localAssocs[s.id] === track.id);

            ${theme.accent} ${(selectedHero && selectedTheme && !isGenerating) ? 'opacity-100'
                                : 'opacity-50 cursor-not-allowed'}`}>
                            {isGenerating ? (
                                <>
                                    <Loader2 className="w-6 h-6 animate-spin" /> Forging Magic...
                                </>
                            ) : (
                                <>
                                    <Sparkles className="w-6 h-6" /> Forge Story
                                </>
                            )}
                        </button>
                    </div>
                </div>
            );

            const Archive = () => (
                <div className="max-w-6xl mx-auto p-6 animate-fade-in">
                    <div className="flex items-center gap-2 mb-8 text-sm cursor-pointer hover:opacity-80" onClick={() =>
                        setCurrentView('hub')}>
                        <ChevronRight className="w-4 h-4 rotate-180" /> Back to Hub
                    </div>

                    <div className="flex justify-between items-end mb-10">
                        <div>
                            <h1 className={`text-4xl font-bold mb-2 ${isNightMode ? 'font-sans' : 'font-serif'}`}>The Archive</h1>
                            <p className={theme.textMuted}>Your generated adventures and legendary tales.</p>
                        </div>
                    </div>

                    {stories.length === 0 ? (
                        <div className={`p-12 rounded-3xl border-2 border-dashed flex flex-col items-center justify-center text-center
        ${theme.card}`}>
                            <BookOpen className={`w-16 h-16 mb-4 ${theme.textMuted}`} />
                            <h2 className="text-2xl font-bold mb-2">No Stories Yet</h2>
                            <p className={`${theme.textMuted} mb-6`}>Your library is waiting for its first legend.</p>
                            <button onClick={() => setCurrentView('forge')}
                                className={`px-6 py-3 rounded-full font-bold flex items-center gap-2 ${theme.accent}`}
                            >
                                <Sparkles className="w-5 h-5" /> Forge a Story
                            </button>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {stories.map(story => (
                                <div key={story.id} className={`rounded-3xl border-2 overflow-hidden transition-all hover:scale-[1.02]
            cursor-pointer ${theme.card} hover:border-cyan-500`}>
                                    <div className={`h-40 bg-gradient-to-br ${story.theme.color} p-6 flex items-end justify-between relative
                overflow-hidden`}>
                                        <div className="absolute top-4 right-4 text-6xl opacity-20">{story.theme.icon}</div>
                                        <div
                                            className="w-16 h-16 rounded-full bg-white border-4 border-white overflow-hidden flex items-center justify-center text-3xl shadow-lg relative z-10">
                                            {renderCharacterAvatar(story.hero.image, story.hero.name, 'w-full h-full object-cover', 'text-3xl')}
                                        </div>
                                    </div>
                                    <div className="p-6">
                                        <h3 className="text-xl font-bold mb-2">{story.title}</h3>
                                        <p className={`text-sm mb-4 ${theme.textMuted}`}>Forged on {story.date}</p>
                                        <button className={`w-full py-2 rounded-lg font-bold flex items-center justify-center gap-2 bg-slate-100
                    text-slate-800 hover:bg-slate-200 transition-colors`}>
                                            <BookOpen className="w-4 h-4" /> Read Story
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            return (
                <div className={`min-h-screen transition-colors duration-500 ${theme.bg} ${theme.text}`}>
                    {Navbar()}
                    <main className="w-full relative">
                        {currentView === 'landing' && LandingPage()}
                        {currentView === 'auth' && <AuthView theme={theme} isNightMode={isNightMode} setCurrentView={setCurrentView} />}
                        {session && currentView === 'hub' && FamilyHub()}
                        {session && currentView === 'heroes' && HallOfHeroes()}
                        {session && currentView === 'forge' && AdventureForge()}
                        {session && currentView === 'archive' && Archive()}
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
