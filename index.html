<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinTales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3"
      }
    }
    </script>
</head>

<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.3';
        import {
            Sun, Moon, Sparkles, BookOpen, Users,
            Wand2, Image as ImageIcon, Upload, ChevronRight,
            Library, Camera, Shield, PlayCircle, Map, UserPlus, Loader2, Pencil, X
        } from 'lucide-react';

        const supabaseUrl = 'https://wdjcsbdywbfoeayploni.supabase.co';
        const supabaseKey = 'sb_publishable_wJkAdB8VD5Tfxjxce6QbhQ_G7c_7_ak';
        const supabase = createClient(supabaseUrl, supabaseKey);

        const AuthView = ({ theme, isNightMode, setCurrentView }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');

            const handleAuth = async (isSignUp) => {
                setLoading(true);
                setMessage('');
                try {
                    const { error } = isSignUp
                        ? await supabase.auth.signUp({ email, password })
                        : await supabase.auth.signInWithPassword({ email, password });

                    if (error) throw error;
                    if (isSignUp) {
                        setMessage('Sign up successful! (Check email if confirmation is enabled)');
                    } else {
                        setCurrentView('hub');
                    }
                } catch (error) {
                    setMessage(error.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-[80vh] px-4 animate-fade-in">
                    <div className={`p-8 rounded-2xl border ${theme.card} w-full max-w-md shadow-xl`}>
                        <div className="flex justify-center mb-6">
                            <div className={`p-3 rounded-full bg-gradient-to-tr ${theme.portal}`}>
                                <Sparkles className="text-white w-6 h-6" />
                            </div>
                        </div>
                        <h2 className={`text-2xl font-bold text-center mb-6 ${isNightMode ? 'font-sans' : 'font-serif'}`}>Welcome to KinTales</h2>
                        {message && <div className={`p-3 mb-4 rounded-lg text-sm ${message.includes('error') || message.includes('invalid') || message.includes('fetch') ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`}>{message}</div>}
                        <div className="space-y-4">
                            <div>
                                <label className={`block text-xs font-bold uppercase tracking-wider mb-1 ${theme.textMuted}`}>Email</label>
                                <input type="email" value={email} onChange={e => setEmail(e.target.value)} className={`w-full p-3 rounded-lg border bg-transparent focus:outline-none focus:ring-2 focus:ring-cyan-500 ${isNightMode ? 'border-slate-700' : 'border-amber-200'}`} placeholder="you@example.com" />
                            </div>
                            <div>
                                <label className={`block text-xs font-bold uppercase tracking-wider mb-1 ${theme.textMuted}`}>Password</label>
                                <input type="password" value={password} onChange={e => setPassword(e.target.value)} className={`w-full p-3 rounded-lg border bg-transparent focus:outline-none focus:ring-2 focus:ring-cyan-500 ${isNightMode ? 'border-slate-700' : 'border-amber-200'}`} placeholder="••••••••" />
                            </div>
                            <div className="flex gap-4 pt-4">
                                <button onClick={() => handleAuth(true)} disabled={loading} className={`flex-1 py-3 rounded-lg font-bold border-2 transition-all hover:bg-black/5 ${isNightMode ? 'border-slate-700' : 'border-amber-200'}`}>Sign Up</button>
                                <button onClick={() => handleAuth(false)} disabled={loading} className={`flex-1 py-3 rounded-lg font-bold text-white transition-all shadow-md ${theme.accent}`}>Sign In</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };



        function App() {
            // Global State
            const [isNightMode, setIsNightMode] = useState(false);
            const [currentView, setCurrentView] = useState('landing'); // landing, auth, hub, heroes, forge, archive
            const [session, setSession] = useState(null);
            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);

            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    setSession(session);
                    setUser(session?.user);
                    setIsAdmin(session?.user?.email === 'admin@kintales.com');
                });

                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
                    setSession(session);
                    setUser(session?.user);
                    setIsAdmin(session?.user?.email === 'admin@kintales.com');
                    if (!session && currentView !== 'landing' && currentView !== 'auth') {
                        setCurrentView('landing');
                    }
                });

                return () => subscription.unsubscribe();
            }, [currentView]);

            // Local State for specific views
            const [heroTab, setHeroTab] = useState('gallery'); // gallery, training
            const [selectedHero, setSelectedHero] = useState(null);
            const [selectedTheme, setSelectedTheme] = useState(null);

            // Themes
            const themes = [
                { id: 'treasure', name: 'Treasure Hunter', icon: '🗺️', color: 'from-amber-400 to-orange-500' },
                { id: 'space', name: 'Sci-Fi Explorer', icon: '🚀', color: 'from-blue-500 to-indigo-600' },
                { id: 'fairy', name: 'Fairy Tale', icon: '🏰', color: 'from-pink-400 to-rose-500' },
                { id: 'race', name: 'Race Cars', icon: '🏎️', color: 'from-red-500 to-orange-600' }
            ];

            // App Data State
            const [characters, setCharacters] = useState([]);
            const [stories, setStories] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);
            const [isLoadingData, setIsLoadingData] = useState(false);
            const [isUploading, setIsUploading] = useState(false);

            useEffect(() => {
                if (!session?.user) return;
                const loadData = async () => {
                    setIsLoadingData(true);
                    try {
                        const [charsResponse, storiesResponse] = await Promise.all([
                            supabase.from('characters').select('*').order('created_at', { ascending: false }),
                            supabase.from('stories').select('*, character:characters(*)').order('created_at', { ascending: false })
                        ]);

                        if (charsResponse.error) throw charsResponse.error;
                        if (storiesResponse.error) throw storiesResponse.error;

                        const mappedChars = charsResponse.data.map(c => ({
                            ...c,
                            image: c.emoji_icon || '✨',
                            images: c.image_paths || []
                        }));

                        const mappedStories = storiesResponse.data.map(s => ({
                            ...s,
                            hero: {
                                ...s.character,
                                image: s.character?.emoji_icon || '✨'
                            },
                            theme: themes.find(t => t.id === s.theme_id) || themes[0],
                            date: new Date(s.created_at).toLocaleDateString()
                        }));

                        setCharacters(mappedChars);
                        setStories(mappedStories);
                    } catch (err) {
                        console.error("Error loading data:", err);
                    } finally {
                        setIsLoadingData(false);
                    }
                };
                loadData();
            }, [session]);

            // Form State
            const [editingHeroId, setEditingHeroId] = useState(null);
            const [newHeroName, setNewHeroName] = useState('');
            const [newHeroRole, setNewHeroRole] = useState('');
            const [uploadedImages, setUploadedImages] = useState([]);
            const [isAnalyzingImage, setIsAnalyzingImage] = useState(false);
            const [archetypeMode, setArchetypeMode] = useState('standard'); // 'standard' or 'vision'
            const fileInputRef = React.useRef(null);

            const handleEditHero = (hero) => {
                setEditingHeroId(hero.id);
                setNewHeroName(hero.name);
                setNewHeroRole(hero.role);
                setUploadedImages(hero.images || []); // Load existing images
                setArchetypeMode((hero.images && hero.images.length > 0) ? 'vision' : 'standard');
                setHeroTab('training');
            };

            const handleSuggestArchetype = () => {
                if (isAnalyzingImage) return;

                if (archetypeMode === 'vision' && uploadedImages.length > 0) {
                    // Simulate Photo Analysis
                    setIsAnalyzingImage(true);
                    setTimeout(() => {
                        const visionSuggestions = [
                            "The Fluffy Guardian", "The Bright-Eyed Scholar", "The Mischievous Sprite",
                            "The Agile Acrobat", "The Dashing Rogue", "The Gentle Giant",
                            "The Goggled Aviator", "The Shadowy Ninja", "The Golden Retriever of Truth"
                        ];
                        const random = visionSuggestions[Math.floor(Math.random() * visionSuggestions.length)];
                        setNewHeroRole(random);
                        setIsAnalyzingImage(false);
                    }, 1500);
                } else {
                    // Use Standard List
                    const suggestions = [
                        "The Curious Inventor", "The Brave Explorer", "The Loyal Companion",
                        "The Fearless Scout", "The Wise Wizard", "The Noble Knight",
                        "The Swift Runner", "The Master Detective", "The Star Captain",
                        "The Secret Agent", "The Magical Guardian", "The Treasure Hunter",
                        "The Dream Weaver", "The Shadow Walker", "The Cosmic Voyager"
                    ];
                    const random = suggestions[Math.floor(Math.random() * suggestions.length)];
                    setNewHeroRole(random);
                }
            };

            const handleImageUpload = async (e) => {
                if (e.target.files && session?.user) {
                    setIsUploading(true);
                    const files = Array.from(e.target.files);
                    const newImageUrls = [];

                    for (const file of files) {
                        const fileExt = file.name.split('.').pop();
                        const fileName = `${Math.random()}.${fileExt}`;
                        const filePath = `${session.user.id}/${fileName}`;

                        const { error: uploadError } = await supabase.storage
                            .from('hero_images')
                            .upload(filePath, file);

                        if (uploadError) {
                            console.error("Upload error:", uploadError);
                            continue;
                        }

                        const { data: { publicUrl } } = supabase.storage
                            .from('hero_images')
                            .getPublicUrl(filePath);

                        newImageUrls.push(publicUrl);
                    }

                    setUploadedImages(prev => {
                        const newImages = [...prev, ...newImageUrls];
                        if (newImages.length > 0) setArchetypeMode('vision');
                        return newImages;
                    });
                    setIsUploading(false);
                }
            };

            const handleRemoveImage = (indexToRemove) => {
                setUploadedImages(prev => {
                    const newImages = prev.filter((_, idx) => idx !== indexToRemove);
                    if (newImages.length === 0) setArchetypeMode('standard');
                    return newImages;
                });
            };

            const handleSaveHero = async () => {
                if (!newHeroName || !session?.user) return;
                setIsGenerating(true);

                try {
                    const heroData = {
                        user_id: session.user.id,
                        name: newHeroName,
                        role: newHeroRole || 'The Mysterious Wanderer',
                        type: 'child',
                        emoji_icon: uploadedImages.length > 0 ? '✨' : '🌟',
                        image_paths: uploadedImages
                    };

                    if (editingHeroId) {
                        // Update existing
                        const { data, error } = await supabase.from('characters').update(heroData).eq('id', editingHeroId).select().single();
                        if (error) throw error;

                        setCharacters(characters.map(c => c.id === editingHeroId ? { ...data, image: data.emoji_icon, images: data.image_paths } : c));
                    } else {
                        // Create new
                        const { data, error } = await supabase.from('characters').insert(heroData).select().single();
                        if (error) throw error;

                        setCharacters([{ ...data, image: data.emoji_icon, images: data.image_paths }, ...characters]);
                    }

                    setEditingHeroId(null);
                    setNewHeroName('');
                    setNewHeroRole('');
                    setUploadedImages([]);
                    setArchetypeMode('standard');
                    setHeroTab('gallery');
                } catch (err) {
                    console.error("Error saving hero:", err);
                    alert("Failed to save hero: " + err.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            const handleCancelEdit = () => {
                setEditingHeroId(null);
                setNewHeroName('');
                setNewHeroRole('');
                setUploadedImages([]);
                setHeroTab('gallery');
            };

            const handleForgeStory = async () => {
                if (!selectedHero || !selectedTheme || !session?.user) return;
                setIsGenerating(true);

                try {
                    const hero = characters.find(c => c.id === selectedHero);
                    const themeObj = themes.find(t => t.id === selectedTheme);
                    const title = `${hero.name}'s ${themeObj.name} Adventure`;

                    const { data, error } = await supabase.from('stories').insert({
                        user_id: session.user.id,
                        character_id: hero.id,
                        title: title,
                        theme_id: themeObj.id
                    }).select('*, character:characters(*)').single();

                    if (error) throw error;

                    const newStory = {
                        ...data,
                        hero: { ...data.character, image: data.character?.emoji_icon || '✨' },
                        theme: themeObj,
                        date: new Date(data.created_at).toLocaleDateString()
                    };

                    setStories([newStory, ...stories]);
                    setCurrentView('archive');
                    setSelectedHero(null);
                    setSelectedTheme(null);
                } catch (err) {
                    console.error("Error forging story:", err);
                    alert("Failed to forge story: " + err.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            // Theme configuration based on Day/Night state
            const theme = isNightMode
                ? {
                    bg: 'bg-slate-900',
                    text: 'text-slate-100',
                    textMuted: 'text-slate-400',
                    card: 'bg-slate-800 border-slate-700',
                    portal: 'from-indigo-900 via-purple-800 to-cyan-900',
                    portalGlow: 'shadow-[0_0_50px_rgba(56,189,248,0.5)]',
                    accent: 'bg-cyan-600 hover:bg-cyan-500 text-white',
                    accentText: 'text-cyan-400'
                }
                : {
                    bg: 'bg-amber-50',
                    text: 'text-slate-800',
                    textMuted: 'text-slate-500',
                    card: 'bg-white border-amber-200',
                    portal: 'from-amber-200 via-rose-200 to-purple-200',
                    portalGlow: 'shadow-[0_0_50px_rgba(251,191,36,0.5)]',
                    accent: 'bg-rose-500 hover:bg-rose-400 text-white',
                    accentText: 'text-rose-500'
                };

            // --- Components ---

            const Navbar = () => (
                <nav className={`w-full p-4 flex justify-between items-center border-b ${isNightMode ? 'border-slate-800' : 'border-amber-200'}`}>
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => setCurrentView('landing')}>
                        <div className={`p-2 rounded-full bg-gradient-to-tr ${theme.portal}`}>
                            <Sparkles className="text-white w-5 h-5" />
                        </div>
                        <span className={`text-2xl font-bold tracking-tight ${isNightMode ? 'font-sans' : 'font-serif'}`}>
                            KinTales
                        </span>
                    </div>

                    <div className="flex items-center gap-4">
                        <button onClick={() => setIsNightMode(!isNightMode)}
                            className={`p-2 rounded-full transition-colors ${isNightMode ? 'bg-slate-800 text-yellow-400' : 'bg-white ' +
                                'text-slate-600 shadow-sm'}`}
                            title="Toggle Realm"
                        >
                            {isNightMode ? <Moon className="w-5 h-5" /> : <Sun className="w-5 h-5" />}
                        </button>

                        {currentView === 'landing' && !session ? (
                            <button onClick={() => setCurrentView('auth')}
                                className={`px-4 py-2 rounded-full font-semibold transition-all ${theme.accent}`}
                            >
                                Sign In / Sign Up
                            </button>
                        ) : currentView === 'landing' && session ? (
                            <button onClick={() => setCurrentView('hub')}
                                className={`px-4 py-2 rounded-full font-semibold transition-all ${theme.accent}`}
                            >
                                Open Your Portal
                            </button>
                        ) : (
                            <div className="flex gap-2 items-center">
                                {isAdmin && <span className="mr-2 text-xs font-bold text-cyan-500 border border-cyan-500 px-2 py-1 rounded-full">ADMIN</span>}
                                <button onClick={() => setCurrentView('hub')}
                                    className={`px-4 py-2 rounded-full font-semibold transition-all bg-transparent border-2 ${isNightMode ? 'border-slate-700 hover:bg-slate-800' : 'border-amber-200 hover:bg-amber-100'}`}
                                >
                                    Dashboard
                                </button>
                                <button onClick={() => supabase.auth.signOut()}
                                    className={`px-4 py-2 rounded-full font-semibold transition-all bg-red-500/10 text-red-500 hover:bg-red-500/20`}
                                >
                                    Sign Out
                                </button>
                            </div>
                        )}
                    </div>
                </nav>
            );

            const LandingPage = () => (
                <div
                    className="flex flex-col items-center justify-center min-h-[80vh] px-4 text-center max-w-4xl mx-auto animate-fade-in">
                    <div className="mb-8 relative">
                        <div className={`w-64 h-64 md:w-80 md:h-80 rounded-full bg-gradient-to-tr ${theme.portal} ${theme.portalGlow}
            animate-pulse flex items-center justify-center`}>
                            <Wand2 className="w-24 h-24 text-white opacity-80" />
                        </div>
                    </div>

                    <h1 className={`text-5xl md:text-7xl font-bold mb-6 ${isNightMode ? 'font-sans' : 'font-serif'}`}>
                        {isNightMode ? "Enter the Realm of Legends" : "Where all of MY Fairy Tales Come to Life"}
                    </h1>

                    <p className={`text-xl md:text-2xl mb-10 ${theme.textMuted}`}>
                        Transform your photos into personalized adventures where your family, friends, and pets are the stars.
                    </p>

                    <button onClick={() => setCurrentView(session ? 'hub' : 'auth')}
                        className={`px-8 py-4 text-xl rounded-full font-bold transition-transform hover:scale-105 shadow-lg
        ${theme.accent}`}
                    >
                        {isNightMode ? "Unlock the Legend" : "Start Your Adventure"}
                    </button>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mt-20 text-left w-full">
                        <div className={`p-6 rounded-2xl border ${theme.card}`}>
                            <Users className={`w-10 h-10 mb-4 ${theme.accentText}`} />
                            <h3 className="text-xl font-bold mb-2">1. Summon Your Heroes</h3>
                            <p className={theme.textMuted}>Upload photos of your family, friends, and even pets to train your personal
                                cast.</p>
                        </div>
                        <div className={`p-6 rounded-2xl border ${theme.card}`}>
                            <Map className={`w-10 h-10 mb-4 ${theme.accentText}`} />
                            <h3 className="text-xl font-bold mb-2">2. Choose Your Realm</h3>
                            <p className={theme.textMuted}>Select themes from Treasure Hunter to Sci-Fi Graphic Novels.</p>
                        </div>
                        <div className={`p-6 rounded-2xl border ${theme.card}`}>
                            <BookOpen className={`w-10 h-10 mb-4 ${theme.accentText}`} />
                            <h3 className="text-xl font-bold mb-2">3. Watch it Unfold</h3>
                            <p className={theme.textMuted}>Experience a complete, beautifully illustrated story starring your Kin.</p>
                        </div>
                    </div>
                </div>
            );

            const FamilyHub = () => (
                <div className="max-w-6xl mx-auto p-6 animate-fade-in">
                    <div className="flex justify-between items-end mb-10">
                        <div>
                            <h1 className={`text-4xl font-bold mb-2 ${isNightMode ? 'font-sans' : 'font-serif'}`}>
                                Welcome to the {isNightMode ? 'Command Center' : 'KinTales Kingdom'}
                            </h1>
                            <p className={theme.textMuted}>Manage your characters and launch new adventures.</p>
                        </div>
                        <button onClick={() => setCurrentView('forge')}
                            className={`px-6 py-3 rounded-full font-bold flex items-center gap-2 ${theme.accent}`}
                        >
                            <Sparkles className="w-5 h-5" /> Forge New Story
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
                        {/* Core Modules */}
                        <div onClick={() => setCurrentView('heroes')}
                            className={`cursor-pointer p-8 rounded-3xl border-2 transition-all hover:scale-[1.02] ${theme.card}
            ${isNightMode ? 'hover:border-cyan-500' : 'hover:border-rose-400'}`}
                        >
                            <div className={`w-16 h-16 rounded-2xl mb-6 flex items-center justify-center bg-gradient-to-br
                ${theme.portal}`}>
                                <Shield className="w-8 h-8 text-white" />
                            </div>
                            <h2 className="text-2xl font-bold mb-2">Hall of Heroes</h2>
                            <p className={theme.textMuted}>Manage your family, friends, and pets. Upload photos to prepare your
                                characters.</p>
                            <div className="mt-6 flex -space-x-3">
                                {characters.map(c => (
                                    <div key={c.id} className={`w-10 h-10 rounded-full border-2 flex items-center justify-center text-xl
                    bg-slate-200 ${isNightMode ? 'border-slate-800' : 'border-white'}`}>
                                        {c.image}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className={`p-8 rounded-3xl border-2 ${theme.card}`}>
                            <div className="w-16 h-16 rounded-2xl mb-6 flex items-center justify-center bg-slate-200">
                                <Library className="w-8 h-8 text-slate-600" />
                            </div>
                            <h2 className="text-2xl font-bold mb-2">The Archive</h2>
                            <p className={theme.textMuted}>Read your saved stories and series. Access the Treasury for merch.</p>
                            <button onClick={() => setCurrentView('archive')}
                                className={`mt-6 text-sm font-semibold flex items-center gap-1 ${theme.accentText}`}
                            >
                                View Library
                                <ChevronRight className="w-4 h-4" />
                            </button>
                        </div>

                        {/* Adventure Tracks */}
                        <div className="col-span-1 md:col-span-2 lg:col-span-1 flex flex-col gap-4">
                            <h3 className="text-xl font-bold">Active Adventure Tracks</h3>
                            <div className={`p-4 rounded-xl border flex items-center justify-between cursor-pointer hover:bg-black/5
                ${theme.card}`}>
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-xl border">
                                        👧🏽</div>
                                    <div>
                                        <h4 className="font-bold">Maya's Missions</h4>
                                        <p className={`text-xs ${theme.textMuted}`}>3 Stories • Last: The Crystal Caves</p>
                                    </div>
                                </div>
                                <PlayCircle className={theme.accentText} />
                            </div>
                            <div className={`p-4 rounded-xl border flex items-center justify-between cursor-pointer hover:bg-black/5
                ${theme.card}`}>
                                <div className="flex items-center gap-3">
                                    <div
                                        className="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center text-xl border">
                                        👦🏻</div>
                                    <div>
                                        <h4 className="font-bold">Sam's Sci-Fi Series</h4>
                                        <p className={`text-xs ${theme.textMuted}`}>1 Story • Last: Mars Rover Rescue</p>
                                    </div>
                                </div>
                                <PlayCircle className={theme.accentText} />
                            </div>
                        </div>
                    </div>
                </div>
            );

            const HallOfHeroes = () => (
                <div className="max-w-5xl mx-auto p-6 animate-fade-in">
                    <div className="flex items-center gap-2 mb-8 text-sm cursor-pointer hover:opacity-80" onClick={() =>
                        setCurrentView('hub')}>
                        <ChevronRight className="w-4 h-4 rotate-180" /> Back to Hub
                    </div>

                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
                        <div>
                            <h1 className={`text-4xl font-bold mb-2 ${isNightMode ? 'font-sans' : 'font-serif'}`}>Hall of Heroes</h1>
                            <p className={theme.textMuted}>Manage your Kin. Prepare your characters or view their magical portraits.</p>
                        </div>

                        {/* The Magic Toggle */}
                        <div className={`flex p-1 rounded-full border ${theme.card}`}>
                            <button onClick={() => setHeroTab('gallery')}
                                className={`px-6 py-2 rounded-full font-semibold text-sm transition-all ${heroTab === 'gallery' ?
                                    theme.accent : 'text-slate-500 hover:text-slate-800'}`}
                            >
                                Gallery of Legends
                            </button>
                            <button onClick={() => {
                                setEditingHeroId(null);
                                setNewHeroName('');
                                setNewHeroRole('');
                                setHeroTab('training');
                            }}
                                className={`px-6 py-2 rounded-full font-semibold text-sm transition-all ${heroTab === 'training' ?
                                    theme.accent : 'text-slate-500 hover:text-slate-800'}`}
                            >
                                Training Sanctum
                            </button>
                        </div>
                    </div>

                    {heroTab === 'gallery' ? (
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                            {characters.map(c => (
                                <div key={c.id} className={`rounded-2xl overflow-hidden border relative group ${theme.card}`}>
                                    <div className={`absolute top-3 right-3 p-2 rounded-full cursor-pointer z-10 transition-opacity bg-white/90
                text-slate-800 hover:bg-white shadow-sm opacity-0 group-hover:opacity-100`} onClick={() =>
                                            handleEditHero(c)}
                                        title="Edit Hero"
                                    >
                                        <Pencil className="w-4 h-4" />
                                    </div>
                                    <div className="aspect-square bg-slate-200 flex items-center justify-center text-6xl relative">
                                        {c.image}
                                        <div
                                            className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                                            <button
                                                className="bg-white text-slate-900 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2 pointer-events-auto">
                                                <Wand2 className="w-4 h-4" /> Preview Theme
                                            </button>
                                        </div>
                                    </div>
                                    <div className="p-4">
                                        <h3 className="font-bold text-lg">{c.name}</h3>
                                        <p className={`text-xs mt-1 ${theme.accentText}`}>{c.role}</p>
                                    </div>
                                </div>
                            ))}
                            <div onClick={() => {
                                setEditingHeroId(null);
                                setNewHeroName('');
                                setNewHeroRole('');
                                setHeroTab('training');
                            }}
                                className={`rounded-2xl border-2 border-dashed flex flex-col items-center justify-center aspect-square
            cursor-pointer transition-colors hover:bg-black/5 ${isNightMode ? 'border-slate-700' : 'border-amber-200'}`}
                            >
                                <UserPlus className="w-8 h-8 mb-2 text-slate-400" />
                                <span className="font-semibold text-slate-500">Add New Hero</span>
                            </div>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2 space-y-6">
                                <div className={`p-6 rounded-2xl border ${theme.card}`}>
                                    <h3 className="text-xl font-bold mb-4 flex items-center gap-2">
                                        <Camera className="w-5 h-5" /> Visual Archive
                                    </h3>
                                    <p className={`text-sm mb-4 ${theme.textMuted}`}>Upload 5-10 images of a single person or pet from
                                        different angles for the best Graphic Novel results.</p>

                                    <div onClick={() => fileInputRef.current?.click()}
                                        className={`w-full h-48 rounded-xl border-2 border-dashed flex flex-col items-center justify-center
                    cursor-pointer transition-colors hover:bg-black/5 ${isNightMode ? 'border-slate-700 bg-slate-800/50'
                                                : 'border-amber-300 bg-amber-50/50'}`}
                                    >
                                        <Upload className="w-8 h-8 mb-3 text-slate-400" />
                                        <span className="font-semibold">Drag & Drop Photos/Videos</span>
                                        <span className="text-xs text-slate-400 mt-1">or click to browse</span>
                                        <input type="file" multiple accept="image/*,video/*" className="hidden" ref={fileInputRef}
                                            onChange={handleImageUpload} />
                                    </div>

                                    <div className="flex gap-4 mt-4 overflow-x-auto pb-2">
                                        {uploadedImages.map((imgUrl, idx) => (
                                            <div key={idx} className={`w-20 h-20 rounded-lg shrink-0 border-2 overflow-hidden flex items-center
                        justify-center relative group ${isNightMode ? 'border-cyan-500' : 'border-green-400'}`}>
                                                <img src={imgUrl} alt={`Uploaded reference ${idx}`} className="w-full h-full object-cover" />
                                                <button onClick={(e) => {
                                                    e.stopPropagation();
                                                    handleRemoveImage(idx);
                                                }}
                                                    className="absolute top-1 right-1 p-1 bg-black/50 text-white rounded-full opacity-0
                            group-hover:opacity-100 transition-opacity hover:bg-red-500"
                                                >
                                                    <X className="w-3 h-3" />
                                                </button>
                                            </div>
                                        ))}

                                        {uploadedImages.length === 0 && (
                                            <>
                                                <div
                                                    className="w-20 h-20 rounded-lg bg-slate-200 shrink-0 border flex items-center justify-center text-3xl opacity-50">
                                                    👦🏻</div>
                                                <div
                                                    className="w-20 h-20 rounded-lg bg-slate-200 shrink-0 border flex items-center justify-center text-3xl opacity-30">
                                                    👦🏻</div>
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-6">
                                <div className={`p-6 rounded-2xl border ${theme.card}`}>
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-xl font-bold flex items-center gap-2">
                                            <Sparkles className="w-5 h-5" /> Personality Spark
                                        </h3>
                                    </div>

                                    <div className="space-y-4">
                                        <div>
                                            <label className={`text-xs font-bold uppercase tracking-wider ${theme.textMuted}`}>Name</label>
                                            <input type="text" value={newHeroName} onChange={(e) => setNewHeroName(e.target.value)}
                                                placeholder="e.g. Sam"
                                                className={`w-full mt-1 p-3 rounded-lg border bg-transparent focus:outline-none focus:ring-2
                        focus:ring-cyan-500 ${isNightMode ? 'border-slate-700' : 'border-amber-200'}`}
                                            />
                                        </div>
                                        <div>
                                            <div className="flex justify-between items-end mb-1">
                                                <label className={`text-xs font-bold uppercase tracking-wider ${theme.textMuted}`}>Suggested
                                                    Archetype</label>

                                                {/* Archetype Generator Mode Toggle */}
                                                <div className="flex bg-black/5 rounded-lg p-1">
                                                    <button onClick={() => setArchetypeMode('standard')}
                                                        className={`text-[10px] font-bold px-2 py-1 rounded-md transition-colors
                                    ${archetypeMode === 'standard' ? (isNightMode ? 'bg-cyan-600 text-white' :
                                                                'bg-rose-500 text-white') : 'text-slate-500'}`}
                                                    >
                                                        Standard
                                                    </button>
                                                    <button onClick={() => setArchetypeMode('vision')}
                                                        disabled={uploadedImages.length === 0}
                                                        className={`text-[10px] font-bold px-2 py-1 rounded-md transition-colors
                                    ${archetypeMode === 'vision' ? (isNightMode ? 'bg-cyan-600 text-white' :
                                                                'bg-rose-500 text-white') : 'text-slate-500'} ${uploadedImages.length === 0 ?
                                                                    'opacity-30 cursor-not-allowed' : ''}`}
                                                        title={uploadedImages.length === 0 ? "Upload photos to unlock Vision Analysis" :
                                                            "Analyze Photos"}
                                                    >
                                                        Vision
                                                    </button>
                                                </div>
                                            </div>

                                            <div className={`p-3 rounded-lg border mt-1 flex justify-between items-center ${isNightMode
                                                ? 'bg-slate-800 border-cyan-800' : 'bg-rose-50 border-rose-200'}`}>
                                                <input type="text" value={isAnalyzingImage ? "Analyzing photos..." : newHeroRole}
                                                    onChange={(e) => setNewHeroRole(e.target.value)}
                                                    disabled={isAnalyzingImage}
                                                    placeholder={archetypeMode === 'vision' ? "Awaiting visual cues..." : "The Curious " +
                                                        "Inventor"}
                                                    className={`bg-transparent border-none focus:outline-none w-full font-bold
                            ${isAnalyzingImage ? 'opacity-50' : ''}`}
                                                />
                                                {isAnalyzingImage ? (
                                                    <Loader2 className="w-4 h-4 animate-spin text-cyan-500" />
                                                ) : (
                                                    <Wand2 onClick={handleSuggestArchetype}
                                                        className="w-4 h-4 cursor-pointer hover:rotate-180 transition-transform active:scale-90" />
                                                )}
                                            </div>
                                        </div>
                                        <div>
                                            <label className={`text-xs font-bold uppercase tracking-wider ${theme.textMuted}`}>Manual Quirk
                                                (Optional)</label>
                                            <textarea placeholder="e.g. Always wears a backwards red hat..." className={`w-full mt-1 p-3
                            rounded-lg border bg-transparent focus:outline-none focus:ring-2 focus:ring-cyan-500
                            min-h-[100px] ${isNightMode ? 'border-slate-700' : 'border-amber-200'}`}></textarea>
                                        </div>

                                        <div className="flex gap-2 pt-2">
                                            {editingHeroId && (
                                                <button onClick={handleCancelEdit} className={`flex-1 py-3 rounded-lg font-bold transition-all
                            border-2 ${isNightMode ? 'border-slate-700 hover:bg-slate-800'
                                                        : 'border-amber-200 hover:bg-amber-100'}`}>
                                                    Cancel
                                                </button>
                                            )}
                                            <button onClick={handleSaveHero} disabled={!newHeroName} className={`flex-[2] py-3 rounded-lg
                            font-bold transition-all disabled:opacity-50 ${theme.accent}`}>
                                                {editingHeroId ? 'Update Hero' : 'Save Hero'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            const AdventureForge = () => (
                <div className="max-w-5xl mx-auto p-6 animate-fade-in pb-24">
                    <div className="flex items-center gap-2 mb-8 text-sm cursor-pointer hover:opacity-80" onClick={() =>
                        setCurrentView('hub')}>
                        <ChevronRight className="w-4 h-4 rotate-180" /> Back to Hub
                    </div>

                    <div className="text-center mb-12">
                        <h1 className={`text-4xl md:text-5xl font-bold mb-4 ${isNightMode ? 'font-sans' : 'font-serif'}`}>The Adventure
                            Forge</h1>
                        <p className={`text-lg ${theme.textMuted}`}>Select your cast and realm, and let the magic begin.</p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                        {/* Left Side: Cast */}
                        <div className="space-y-8">
                            <div>
                                <h2 className="text-2xl font-bold mb-4 flex items-center gap-2">
                                    <span className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold text-white
                        ${theme.accent}`}>1</span>
                                    Choose Main Hero
                                </h2>
                                <div className="flex gap-4 overflow-x-auto pb-4">
                                    {characters.map(c => (
                                        <div key={c.id} onClick={() => setSelectedHero(c.id)}
                                            className={`cursor-pointer transition-all flex flex-col items-center gap-2 min-w-[90px]
                        ${selectedHero === c.id ? 'scale-110' : 'opacity-70 hover:opacity-100'}`}
                                        >
                                            <div className={`w-20 h-20 rounded-full border-4 flex items-center justify-center text-4xl
                            bg-slate-200 ${selectedHero === c.id ? (isNightMode ? 'border-cyan-400' : 'border-rose-400')
                                                    : 'border-transparent'}`}>
                                                {c.image}
                                            </div>
                                            <span className="font-semibold text-sm">{c.name}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div>
                                <h2 className="text-2xl font-bold mb-4 flex items-center gap-2">
                                    <span className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold text-white
                        ${theme.accent}`}>2</span>
                                    Gather the Crew
                                </h2>
                                <div className={`p-6 rounded-2xl border-2 border-dashed flex items-center justify-center cursor-pointer
                    transition-colors ${isNightMode ? 'border-slate-700 hover:bg-slate-800'
                                        : 'border-amber-200 hover:bg-white'}`}>
                                    <div className="flex -space-x-4">
                                        <div
                                            className="w-12 h-12 rounded-full border-2 border-white bg-slate-100 flex items-center justify-center text-2xl z-20 shadow-sm">
                                            🐕</div>
                                        <div
                                            className="w-12 h-12 rounded-full border-2 border-white bg-slate-100 flex items-center justify-center text-2xl z-10 shadow-sm">
                                            🦎</div>
                                        <div className={`w-12 h-12 rounded-full border-2 flex items-center justify-center shadow-sm z-0
                            ${theme.accent} border-white`}>
                                            <Users className="w-5 h-5 text-white" />
                                        </div>
                                    </div>
                                    <span className="ml-4 font-bold">Add Participants</span>
                                </div>
                            </div>
                        </div>

                        {/* Right Side: Realm & Output */}
                        <div className="space-y-8">
                            <div>
                                <h2 className="text-2xl font-bold mb-4 flex items-center gap-2">
                                    <span className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold text-white
                        ${theme.accent}`}>3</span>
                                    Pick Your Realm
                                </h2>
                                <div className="grid grid-cols-2 gap-4">
                                    {themes.map(t => (
                                        <div key={t.id} onClick={() => setSelectedTheme(t.id)}
                                            className={`cursor-pointer p-4 rounded-2xl border-2 transition-all flex flex-col items-center
                        justify-center gap-2 text-center h-32 relative overflow-hidden ${selectedTheme === t.id ?
                                                    (isNightMode ? 'border-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.3)]' : 'border-rose-400 ' +
                                                        'shadow-md') : `border-transparent ${theme.card}`}`}
                                        >
                                            <div className={`absolute inset-0 bg-gradient-to-br ${t.color} opacity-10`} />
                                            <span className="text-4xl relative z-10">{t.icon}</span>
                                            <span className="font-bold text-sm relative z-10">{t.name}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className={`p-6 rounded-2xl border ${theme.card}`}>
                                <h3 className="font-bold mb-4">Story Format</h3>
                                <div className={`flex p-1 rounded-xl bg-black/5`}>
                                    <button className={`flex-1 py-3 rounded-lg font-bold text-sm transition-all ${!isNightMode
                                        ? 'bg-white shadow-sm text-rose-500' : 'text-slate-500 hover:text-slate-300'}`}>
                                        Storybook (Kids)
                                    </button>
                                    <button className={`flex-1 py-3 rounded-lg font-bold text-sm transition-all ${isNightMode
                                        ? 'bg-slate-700 shadow-sm text-cyan-400' : 'text-slate-500 hover:text-slate-800'}`}>
                                        Graphic Novel (Teens)
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Fixed Bottom Action Bar */}
                    <div className={`fixed bottom-0 left-0 w-full p-4 border-t backdrop-blur-md flex justify-center z-50 ${isNightMode
                        ? 'bg-slate-900/80 border-slate-800' : 'bg-white/80 border-amber-200'}`}>
                        <button onClick={handleForgeStory} disabled={!selectedHero || !selectedTheme || isGenerating} className={`px-12
            py-4 rounded-full text-xl font-bold shadow-lg transition-transform hover:scale-105 flex items-center gap-3
            ${theme.accent} ${(selectedHero && selectedTheme && !isGenerating) ? 'opacity-100'
                                : 'opacity-50 cursor-not-allowed'}`}>
                            {isGenerating ? (
                                <>
                                    <Loader2 className="w-6 h-6 animate-spin" /> Forging Magic...
                                </>
                            ) : (
                                <>
                                    <Sparkles className="w-6 h-6" /> Forge Story
                                </>
                            )}
                        </button>
                    </div>
                </div>
            );

            const Archive = () => (
                <div className="max-w-6xl mx-auto p-6 animate-fade-in">
                    <div className="flex items-center gap-2 mb-8 text-sm cursor-pointer hover:opacity-80" onClick={() =>
                        setCurrentView('hub')}>
                        <ChevronRight className="w-4 h-4 rotate-180" /> Back to Hub
                    </div>

                    <div className="flex justify-between items-end mb-10">
                        <div>
                            <h1 className={`text-4xl font-bold mb-2 ${isNightMode ? 'font-sans' : 'font-serif'}`}>The Archive</h1>
                            <p className={theme.textMuted}>Your generated adventures and legendary tales.</p>
                        </div>
                    </div>

                    {stories.length === 0 ? (
                        <div className={`p-12 rounded-3xl border-2 border-dashed flex flex-col items-center justify-center text-center
        ${theme.card}`}>
                            <BookOpen className={`w-16 h-16 mb-4 ${theme.textMuted}`} />
                            <h2 className="text-2xl font-bold mb-2">No Stories Yet</h2>
                            <p className={`${theme.textMuted} mb-6`}>Your library is waiting for its first legend.</p>
                            <button onClick={() => setCurrentView('forge')}
                                className={`px-6 py-3 rounded-full font-bold flex items-center gap-2 ${theme.accent}`}
                            >
                                <Sparkles className="w-5 h-5" /> Forge a Story
                            </button>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {stories.map(story => (
                                <div key={story.id} className={`rounded-3xl border-2 overflow-hidden transition-all hover:scale-[1.02]
            cursor-pointer ${theme.card} hover:border-cyan-500`}>
                                    <div className={`h-40 bg-gradient-to-br ${story.theme.color} p-6 flex items-end justify-between relative
                overflow-hidden`}>
                                        <div className="absolute top-4 right-4 text-6xl opacity-20">{story.theme.icon}</div>
                                        <div
                                            className="w-16 h-16 rounded-full bg-white border-4 border-white flex items-center justify-center text-3xl shadow-lg relative z-10">
                                            {story.hero.image}
                                        </div>
                                    </div>
                                    <div className="p-6">
                                        <h3 className="text-xl font-bold mb-2">{story.title}</h3>
                                        <p className={`text-sm mb-4 ${theme.textMuted}`}>Forged on {story.date}</p>
                                        <button className={`w-full py-2 rounded-lg font-bold flex items-center justify-center gap-2 bg-slate-100
                    text-slate-800 hover:bg-slate-200 transition-colors`}>
                                            <BookOpen className="w-4 h-4" /> Read Story
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            return (
                <div className={`min-h-screen transition-colors duration-500 ${theme.bg} ${theme.text}`}>
                    {Navbar()}
                    <main className="w-full relative">
                        {currentView === 'landing' && LandingPage()}
                        {currentView === 'auth' && <AuthView theme={theme} isNightMode={isNightMode} setCurrentView={setCurrentView} />}
                        {session && currentView === 'hub' && FamilyHub()}
                        {session && currentView === 'heroes' && HallOfHeroes()}
                        {session && currentView === 'forge' && AdventureForge()}
                        {session && currentView === 'archive' && Archive()}
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
